name: Excavator

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  excavator:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Install Scoop
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm get.scoop.sh | iex
        shell: powershell

      - name: Debug script output
        run: |
          $r = Invoke-RestMethod 'https://api.github.com/repos/SevenTV/chatterino7/releases/tags/nightly-build'
          $a = $r.assets | Where-Object { $_.name -match 'chatterino-windows-x86-64-Qt-([\d.]+)\.zip' } | Select-Object -First 1
          Write-Host "Asset found: $($a.name)"
          Write-Host "Updated at: $($a.updated_at)"
          if ($a.name -match 'Qt-([\d.]+)\.zip') { $qt = $Matches[1] } else { $qt = 'unknown' }
          $date = ([datetime]$a.updated_at).ToString('yyyyMMddHHmm')
          Write-Host "Version would be: $qt-$date"
        shell: powershell

      - name: Run checkver
        run: |
          $checkver = "$env:USERPROFILE\scoop\apps\scoop\current\bin\checkver.ps1"
          & $checkver * -u -dir "${{ github.workspace }}\bucket"
        shell: powershell

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/
          if (-not (git diff --staged --quiet)) {
            git commit -m "chore: autoupdate manifests $(Get-Date -Format 'yyyy-MM-dd')"
            git push
          } else {
            Write-Host "No updates found."
          }
        shell: powershell
