name: Excavator

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  excavator:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Check for new version and update manifest
        run: |
          $ref = Invoke-RestMethod 'https://api.github.com/repos/SevenTV/chatterino7/git/ref/tags/nightly-build'
          $newSha = $ref.object.sha.Substring(0, 12)
          Write-Host "Latest SHA: $newSha"

          $manifestPath = "${{ github.workspace }}\bucket\chatterino7tv.json"
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $currentVersion = $manifest.version
          Write-Host "Current version: $currentVersion"

          if ($newSha -ne $currentVersion) {
            Write-Host "New version found, updating manifest..."
            $content = Get-Content $manifestPath -Raw
            $content = $content -replace '"version": "[^"]*"', """version"": ""$newSha"""
            Set-Content $manifestPath $content
            Write-Host "Manifest updated to $newSha"
          } else {
            Write-Host "Already up to date."
          }
        shell: powershell

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/
          $diff = git diff --staged --name-only
          if ($diff) {
            $manifest = Get-Content "${{ github.workspace }}\bucket\chatterino7tv.json" -Raw | ConvertFrom-Json
            git commit -m "chore: update chatterino7tv to $($manifest.version)"
            git push
          } else {
            Write-Host "No updates found."
          }
        shell: powershell
